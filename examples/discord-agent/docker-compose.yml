services:
  discord-agent:
    build:
      context: ../../
      dockerfile: examples/discord-agent/Dockerfile
    container_name: identityos-discord-agent
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - identityos-data:/data
    env_file:
      - .env
    environment:
      - IDENTITY_STORAGE_PATH=/data/identities
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  identityos-data:
