app = "identityos-discord-agent"

kill_signal = "SIGINT"
kill_timeout = 5

[env]
  IDENTITY_STORAGE_PATH = "/data/identities"
  LOG_LEVEL = "INFO"
  HEALTHCHECK_PORT = "8080"

[experimental]
  auto_rollback = true

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "15s"
    method = "get"
    path = "/healthz"

[[mounts]]
  source = "identityos_data"
  destination = "/data"
